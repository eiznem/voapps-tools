name: Build VoApps Tools

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build and upload assets to (e.g. v4.0.6)'
        required: true
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # required to upload assets to GitHub releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: build:mac
          - os: windows-latest
            build_cmd: build:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Cache node_modules keyed by OS + Node version + package-lock hash.
      # This preserves the compiled duckdb.node for each platform so that
      # electron-rebuild (which takes ~55 min on Windows) is only run once
      # per package-lock change.  The sharp Proxy stub is also cached.
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node18-${{ hashFiles('package-lock.json') }}

      # Full install: downloads packages + runs postinstall.js which
      #   1. Restores the sharp Proxy stub
      #   2. Runs electron-rebuild to compile duckdb.node for THIS platform
      # Skipped on cache hit (duckdb.node + stub already correct in cache).
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm install

      - name: Build
        # --publish=never prevents electron-builder from trying to auto-upload
        # assets to GitHub (we handle uploads ourselves with gh release upload)
        run: npm run ${{ matrix.build_cmd }} -- --publish=never

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "TAG=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      # Generate release notes from version.js changelog
      - name: Generate release notes
        id: notes
        run: node scripts/generate-release-notes.js

      # Create the release if it does not already exist (no-op if it does)
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release_notes.md \
              --draft=false
          fi

      - name: Upload macOS assets
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          gh release upload "$TAG" dist/*.dmg dist/*-mac.zip --clobber

      - name: Upload Windows assets
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          gh release upload "$TAG" dist/*.exe --clobber
